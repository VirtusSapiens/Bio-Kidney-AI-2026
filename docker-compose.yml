services:
  biokidney-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biokidney-ai
    ports:
      - "8000:8000"
    volumes:
      - biokidney-db:/app/web_app/database
      - biokidney-logs:/app/web_app/logs
    environment:
      - DATABASE_URL=sqlite:////app/web_app/database/biokidney.db
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  biokidney-db:
  biokidney-logs:
